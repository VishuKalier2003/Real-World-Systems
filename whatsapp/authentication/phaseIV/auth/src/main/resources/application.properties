spring.application.name=auth
# ===================== JWT RSA =====================
jwt.private.key=classpath:keys/private_key.pem
jwt.public.key=classpath:keys/public_key.pem
jwt.expiration=300000
ttl.expiration=600

spring.datasource.url=jdbc:mysql://localhost:3306/whatsapp_db
spring.datasource.username=root
spring.datasource.password=Vishu@1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# ===================== JPA =====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===================== REDIS =====================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000
spring.data.redis.lettuce.pool.max-active=100
spring.data.redis.lettuce.pool.max-idle=20
spring.data.redis.lettuce.pool.min-idle=5

server.tomcat.threads.max=1000
server.tomcat.accept-count=2000

spring.datasource.hikari.maximum-pool-size=100
spring.datasource.hikari.minimum-idle=20
spring.datasource.hikari.connection-timeout=20000

logging.level.org.springframework.jdbc=DEBUG
logging.level.com.zaxxer.hikari=DEBUG

spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000