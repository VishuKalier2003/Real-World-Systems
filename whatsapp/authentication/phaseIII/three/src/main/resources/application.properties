spring.application.name=three
# ===================== JWT RSA =====================
jwt.private.key=classpath:keys/private_key.pem
jwt.public.key=classpath:keys/public_key.pem
jwt.expiration=30000
ttl.expiration=120000

# WRITE (Primary)
spring.datasource.write.jdbc-url=jdbc:mysql://localhost:3307/whatsapp_db
spring.datasource.write.username=app_user
spring.datasource.write.password=app_pass

# READ (Replica)
spring.datasource.read.jdbc-url=jdbc:mysql://localhost:3308/whatsapp_db
spring.datasource.read.username=app_user
spring.datasource.read.password=app_pass
# ===================== JPA =====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ===================== REDIS =====================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=60000
spring.data.redis.lettuce.pool.max-active=10
spring.data.redis.lettuce.pool.max-idle=5
spring.data.redis.lettuce.pool.min-idle=1

server.port=8080

server.tomcat.threads.max=500
server.tomcat.accept-count=1000

spring.datasource.write.hikari.maximum-pool-size=30
spring.datasource.read.hikari.maximum-pool-size=30