version: '3.8'

services:

  mysql-primary:
    image: mysql:8.0
    container_name: mysql-primary
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: whatsapp_db
    ports:
      - "3307:3306"
    volumes:
      - primary_data:/var/lib/mysql
      - ./primary.cnf:/etc/mysql/my.cnf
      - ./init-primary.sql:/docker-entrypoint-initdb.d/init.sql

  mysql-replica:
    image: mysql:8.0
    container_name: mysql-replica
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: whatsapp_db
    ports:
      - "3308:3306"
    depends_on:
      - mysql-primary
    volumes:
      - replica_data:/var/lib/mysql
      - ./replica.cnf:/etc/mysql/my.cnf

  redis:
    image: redis:7.2
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  primary_data:
  replica_data:
  redis_data: